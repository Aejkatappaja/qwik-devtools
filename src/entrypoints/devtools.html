<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <script type="module">
      function detectAndCreate() {
        chrome.devtools.inspectedWindow.eval(
          `!!document.querySelector('[q\\\\:container]')`,
          (hasQwik, err) => {
            if (hasQwik && !err) {
              chrome.devtools.panels.create(
                "Qwik",
                "/icon-32.png",
                "/panel.html",
              );
            }
          },
        );
      }

      // Check now
      detectAndCreate();

      // Re-check on navigation (page might load Qwik later)
      chrome.devtools.network.onNavigated.addListener(() => {
        // Small delay to let the page render
        setTimeout(detectAndCreate, 1000);
      });
    </script>
  </body>
</html>
